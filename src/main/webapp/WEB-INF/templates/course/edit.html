<!DOCTYPE html>
<html lang="vi" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Cập nhật khóa học</title>
</head>
<body>
<section layout:fragment="content">
    <h2 class="section-title">Cập nhật khóa học</h2>
    <p class="section-subtitle">Điều chỉnh học phí và lịch khai giảng trong cùng một khung giao diện chung.</p>

    <div class="form-panel">
        <form th:action="@{/course/edit/{id}(id=*{id})}" th:object="${course}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-grid">
                <div class="form-group">
                    <label for="courseCode">Mã khóa học</label>
                    <input id="courseCode" th:field="*{courseCode}" type="text" readonly>
                </div>

                <div class="form-group">
                    <label for="name">Tên khóa học</label>
                    <input id="name" th:field="*{name}" type="text" readonly>
                </div>

                <div class="form-group">
                    <label for="tuitionFee">Học phí</label>
                    <input id="tuitionFee" th:field="*{tuitionFee}" type="number" step="1000">
                </div>

                <div class="form-group">
                    <label for="startDate">Ngày khai giảng</label>
                    <input id="startDate" th:field="*{startDate}" type="date">
                </div>

                <div class="form-group">
                    <label for="teacher">Giảng viên</label>
                    <input id="teacher" th:field="*{teacher}" type="text" readonly>
                </div>

                <div class="form-group">
                    <label for="duration">Thời lượng</label>
                    <input id="duration" th:field="*{duration}" type="text" readonly>
                </div>

                <div class="form-group">
                    <label for="studentCount">Số lượng học viên</label>
                    <input id="studentCount" th:field="*{studentCount}" type="number" min="0">
                </div>
            </div>

            <div class="form-group" style="margin-top: 16px;">
                <label for="description">Mô tả khóa học</label>
                <textarea id="description" th:field="*{description}" rows="5" readonly></textarea>
            </div>

            <div class="form-actions">
                <button class="btn btn-primary" type="submit">Lưu cập nhật</button>
                <a class="btn btn-secondary" th:href="@{/course/list}">Hủy</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
