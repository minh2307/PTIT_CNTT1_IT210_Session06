<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.w3.org/1999/xhtml"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Danh sách khóa học</title>
</head>

<body>

<div layout:fragment="content">

    <h2>Danh sách khóa học</h2>

    <form method="get" th:action="@{/course/list}">

        <label>Level:</label>
        <select name="level">
            <option value="ALL">Tất cả</option>
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
        </select>

        <label>Học phí tối đa:</label>
        <input type="number" name="maxFee" placeholder="VD: 5000000"/>

        <button type="submit">Tìm kiếm</button>

    </form>

    <br>

    <table border="1" width="100%">

        <thead>
        <tr>
            <th>Mã khóa</th>
            <th>Tên khóa</th>
            <th>Level</th>
            <th>Học phí</th>
            <th>Giảng viên</th>
            <th>Chi tiết</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="c : ${courses}">
            <td th:text="${c.courseCode}"></td>
            <td th:text="${c.name}"></td>
            <td th:text="${c.level}"></td>

            <td th:text="${#numbers.formatDecimal(c.tuitionFee,0,'COMMA',0,'POINT')} + ' VNĐ'"></td>

            <td th:text="${c.teacher}"></td>

            <td>
                <a th:href="@{/course/detail/{code}(code=${c.courseCode})}">
                    Xem
                </a>
            </td>
        </tr>

        </tbody>

    </table>

    <br>

    <div th:if="${#lists.isEmpty(courses)}">
        <p style="color:red">
            Hiện chưa có lớp học phù hợp với trình độ này
        </p>
    </div>

</div>

</body>
</html>
