<!DOCTYPE html>
<html lang="vi" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Danh sách khóa học</title>
</head>
<body>
<section layout:fragment="content">
    <h2 class="section-title">Danh sách khóa học</h2>
    <p class="section-subtitle">Theo dõi các chương trình đào tạo đang mở và điều hướng nhanh tới chi tiết từng khóa.</p>

    <div class="grid grid-2" th:if="${courses != null and !#lists.isEmpty(courses)}">
        <article class="course-card" th:each="course : ${courses}">
            <div>
                <span class="badge" th:classappend="${course.full} ? ' badge-danger' : ' badge-success'"
                      th:text="${course.full} ? 'Hết chỗ' : 'Còn chỗ'">Còn chỗ</span>
            </div>
            <h3 th:text="${course.name}">IELTS 6.5</h3>
            <div class="meta-row">
                <span th:text="'Mã: ' + ${course.courseCode}">Mã: IELTS-6.5</span>
                <span th:text="'Trình độ: ' + ${course.level}">Trình độ</span>
                <span th:text="'Học phí: ' + ${course.tuitionFee} + ' VND'">Học phí</span>
            </div>
            <p th:text="${course.description}">Mô tả khóa học.</p>
            <div class="form-actions">
                <a class="btn btn-primary" th:href="@{/course/detail/{courseCode}(courseCode=${course.courseCode})}">Xem chi tiết</a>
                <a class="btn btn-secondary" th:href="@{/course/edit/{courseCode}(courseCode=${course.courseCode})}">Chỉnh sửa</a>
            </div>
        </article>
    </div>

    <div class="empty-state" th:if="${courses == null or #lists.isEmpty(courses)}">
        Chưa có khóa học nào để hiển thị.
    </div>
</section>
</body>
</html>
