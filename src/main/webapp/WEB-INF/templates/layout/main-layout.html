<!DOCTYPE html>
<html lang="vi" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title layout:title-pattern="$CONTENT_TITLE | PTIT English Center">PTIT English Center</title>
  <style>
    :root {
      --primary: #0f4c81;
      --primary-dark: #0a3458;
      --accent: #f4b400;
      --surface: #ffffff;
      --surface-soft: #f3f7fb;
      --border: #d9e2ec;
      --text: #1f2933;
      --muted: #52606d;
      --danger: #c0392b;
      --success: #1f8f55;
      --shadow: 0 14px 32px rgba(15, 76, 129, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef5fb 0%, #f8fbfd 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site-shell {
      min-height: 100vh;
    }

    .site-header {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: #fff;
      padding: 28px 16px 22px;
      box-shadow: var(--shadow);
    }

    .header-inner {
      max-width: 1120px;
      margin: 0 auto;
      text-align: center;
    }

    .logo-mark {
      width: 78px;
      height: 78px;
      margin: 0 auto 14px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.16);
      border: 2px solid rgba(255, 255, 255, 0.28);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .site-title {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
    }

    .site-slogan {
      margin: 8px 0 0;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.88);
    }

    .site-nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .nav-link {
      padding: 16px 18px;
      font-weight: 600;
      color: var(--primary-dark);
      border-bottom: 3px solid transparent;
      transition: 0.2s ease;
    }

    .nav-link:hover {
      color: var(--primary);
      border-bottom-color: var(--accent);
    }

    .page-content {
      max-width: 1120px;
      margin: 28px auto;
      padding: 0 16px 32px;
    }

    .content-card {
      background: var(--surface);
      border: 1px solid rgba(217, 226, 236, 0.9);
      border-radius: 20px;
      padding: 28px;
      box-shadow: var(--shadow);
    }

    .section-title {
      margin: 0 0 20px;
      font-size: 28px;
      color: var(--primary-dark);
    }

    .section-subtitle {
      margin: -8px 0 20px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .grid-2 {
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }

    .course-card,
    .detail-panel,
    .form-panel {
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }

    .badge-success {
      background: rgba(31, 143, 85, 0.12);
      color: var(--success);
    }

    .badge-danger {
      background: rgba(192, 57, 43, 0.12);
      color: var(--danger);
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      margin: 14px 0;
      color: var(--muted);
    }

    .description-box {
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid var(--border);
      line-height: 1.6;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-weight: 600;
      color: var(--primary-dark);
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      font: inherit;
    }

    .form-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 600;
      border: 1px solid transparent;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-secondary {
      background: #fff;
      color: var(--primary-dark);
      border-color: var(--border);
    }

    .empty-state {
      padding: 28px;
      border-radius: 16px;
      text-align: center;
      background: var(--surface-soft);
      color: var(--muted);
      border: 1px dashed var(--border);
    }

    @media (max-width: 768px) {
      .site-title {
        font-size: 24px;
      }

      .content-card {
        padding: 20px;
      }

      .nav-inner {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
<div class="site-shell">
  <header class="site-header">
    <div class="header-inner">
      <div class="logo-mark">PTIT</div>
      <h1 class="site-title">PTIT English Center</h1>
      <p class="site-slogan">Nền tảng học tiếng Anh thực chiến, rõ lộ trình và bám sát đầu ra</p>
    </div>
  </header>

  <nav class="site-nav">
    <div class="nav-inner">
      <a class="nav-link" th:href="@{/course/list}">Danh sách khóa học</a>
      <a class="nav-link" th:href="@{/course/register-consultation}">Đăng ký tư vấn</a>
    </div>
  </nav>

  <main class="page-content">
    <div class="content-card" layout:fragment="content">
      <p>Nội dung trang sẽ được render ở đây.</p>
    </div>
  </main>
</div>
</body>
</html>
